<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rasing App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="root">
    
  </div>

  <script type="text/babel">
    'use strict';

    {

      const Todo = (props) => {
        const handleDeleteClick = () => {
          props.onDeleteClick(props.todo.id);
        };

        const handleCheckboxChange = () => {
          props.onCheckboxChange(props.todo.id);
        };
        return(
          <li>
            <label>
              <input 
                type="checkbox" 
                checked={props.todo.isCompleted} 
                onChange={handleCheckboxChange}
              />
              <span>{props.todo.title}</span>
              <span className="time">{props.todo.createdAt}</span>
            </label>
            <button onClick={handleDeleteClick}>Del</button>
          </li>
        );
      };

      const AddForm = (props) => {
        const [title, setTitle] = React.useState('');
        const inputRef = React.useRef(null);


        const handleTextChange = (e) => {
          setTitle(e.currentTarget.value);
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          props.onSubmit(title);
          setTitle('');
          inputRef.current.focus();
        };
        return (
          <form onSubmit={handleSubmit}>
              <input 
                type="text" 
                value={title}
                onChange={handleTextChange}
                ref={inputRef}
                />
              <button>Add</button>
          </form>
        );
      };

      const App = () => {

       
        // タスク管理の初期データ
        const initialTasks = [
          { id: 1, title: '手続き関係期限の一覧作成、部屋にはる', isCompleted: false, category: 'task' },
          { id: 2, title: '入院バッグの準備', isCompleted: false, category: 'task' },
          { id: 3, title: 'ベビーベット購入', isCompleted: false, category: 'task' }
        ];
        const [todos, setTodos] = React.useState([]);
        
        // オムツの在庫
        const [stock, setStock] = React.useState(50);

        // ミルクの回数
        const [milkCount, setMilkCount] = React.useState(0);

        React.useEffect(() => {
          const saved = localStorage.getItem('todos');
          if (saved) {
            setTodos(JSON.parse(saved));
          } else {
            updateTodos(initialTasks);
          }
        }, []);


        // オムツ在庫管理
        const handleDiaperClick = () => {
          // 1. 在庫を1つ減らす
          setStock(prevStock => prevStock - 1);

          // 2. 現在の時刻を取得（Issue #3のロジックを流用）
          const now = new Date();
          const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

          // 3. ログとして新しいデータを作成
          const newLog = {
            id: Date.now(),
            title: "オムツ交換",
            isCompleted: true, // 記録なので最初からチェック済み扱いにします
            createdAt: timeString
          };
          
          // 4. リストの先頭に追加
          updateTodos([newLog, ...todos]);
        };


        // ミルク飲んだ回数記録
        const handleMilkClick = () => {
        // 1. 回数を1つ増やす（関数型アップデート）
        setMilkCount(prevCount => prevCount + 1);

        // 2. 時刻を取得
        const now = new Date();
        const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

        // 3. ログに追加
        const newLog = {
          id: Date.now(),
          title: "ミルク 🍼",
          isCompleted: true,
          createdAt: timeString,
          category: 'log' // 後でセクションを分ける時に役立ちます
        };
        updateTodos([newLog, ...todos]);
        };
        const updateTodos = (newTodos) => {
          setTodos(newTodos);
          localStorage.setItem('todos', JSON.stringify(newTodos));
        };

        const handlePurgeClick = () => {
          if (!confirm('Sure?')) {
            return;
          }
          const newTodos = todos.filter((todo) => {
            return todo.isCompleted === false;
          });
          updateTodos(newTodos)
        };

        const handleAddFormSubmit = (title) => {
          const newTodos = [...todos];

          const now = new Date();
          const timeString = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
          newTodos.push({
            id: Date.now(),
            title: title,
            isCompleted: false,
            createdAt: timeString
          });
          updateTodos(newTodos);
        };


        const handleTodoCheckboxChange = (id) => {
          const newTodos = todos.map((todo) => {
            return {
              id: todo.id,
              title: todo.title,
              isCompleted: todo.id === id? !todo.isCompleted : todo.isCompleted,
            };
          });
            updateTodos(newTodos);

        };
        const handleTodoDeleteClick = (id) => {
          if (!confirm('Sure?')){
            return;
          }
          const newTodos = todos.filter((todo) => {
            return todo.id !== id;
          });
          updateTodos(newTodos);
        };
        const todoItems = todos.map((todo) => {
          return (
            <Todo
              key={todo.id}
              todo={todo} 
              onDeleteClick={handleTodoDeleteClick}
              onCheckboxChange={handleTodoCheckboxChange}
            />
          );
        });

        // todosの中から「ミルク」という文字が含まれる一番新しいデータを探す
        const lastMilkLog = todos.find(todo => todo.title.includes("ミルク"));
        const lastMilkTime = lastMilkLog ? lastMilkLog.createdAt : "まだ記録がありません";

        return (
          <>
            <h1>
            Baby Care & Tasks
            <button onClick={handlePurgeClick}>Purge</button>
            </h1>

            <div className="status-board">
              <p>オムツ残り: <strong>{stock}</strong> 枚</p>
              <p>今日のミルク: <strong>{milkCount}</strong> 回</p>
              <p>最後飲んだ時間: {lastMilkTime}</p>
              
              {stock <= 10 && <p style={{color: 'red', fontWeight: 'bold'}}>在庫が残りわずかです！</p>}
              
              <button onClick={handleDiaperClick}>🧷オムツ</button>
              <button onClick={handleMilkClick}>🍼 ミルク</button>
            </div>

            <ul id="todos">
              {todoItems}
            </ul>
            <AddForm 
              onSubmit={handleAddFormSubmit}
            />
          </>
        );
      };
      const root = ReactDOM.createRoot(document.querySelector('#root'));
      root.render(
        <App />
      );
    }
  </script>
</body>
</html>
